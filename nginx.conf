server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static dashboard (React app + SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve GeoJSON overlays from public/geojson/
    location /geojson/ {
        try_files $uri =404;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Stable mobile discovery document
    location /cdn/ {
        try_files $uri =404;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=30" always;
    }

    # Proxy WebSocket live-locations to locations_api
    location /locations/ {
        proxy_pass         http://locations_api:2152;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Proxy historical trip query
    location /histlocations/ {
        proxy_pass       http://locations_api:2152;
        proxy_set_header Host $host;
    }

    # Health
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Security headers
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;
}
